<!DOCTYPE html>
<html>
<head>
    <title>Event Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Event Dashboard</h1>

<div class="card">
    <h3>Create Event</h3>
    <input id="bundleId" placeholder="Bundle ID" />
    <input id="sourceType" placeholder="Source Type" />
    <input id="userName" placeholder="User" />
    <input id="severity" placeholder="Severity" />
    <input id="message" placeholder="Message" />
    <button onclick="createEvent()">Create</button>
</div>

<div class="card">
    <h3>All Events</h3>
    <button onclick="loadEvents()">Load Events</button>
    <table id="eventsTable"></table>
</div>

<div class="card">
    <h3>Timeline</h3>
    <input id="timelineBundleId" placeholder="Bundle ID" />
    <button onclick="loadTimeline()">Load Timeline</button>
    <table id="timelineTable"></table>
</div>

<script src="app.js"></script>

</body>
</html>
