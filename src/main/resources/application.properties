spring.application.name=eventservice
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/eventdb
spring.datasource.username=eventuser
spring.datasource.password=eventpass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false

# Set false when connecting to a shared DB that already has bundles/events
app.load-demo-data=true
