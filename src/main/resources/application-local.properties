# Run without Docker/PostgreSQL: embedded H2 (dev / laptop demo only).
# Usage: .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=local"

spring.datasource.url=jdbc:h2:mem:eventdev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
